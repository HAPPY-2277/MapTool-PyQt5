app:
  name: "空间数据质量检查工具"
  version: "1.0.0"
  author: "开发者"

display:
  window_width: 1200
  window_height: 800
  default_zoom: 1.0

error_types:
  - code: "GEOMETRY"
    name: "几何错误"
    color: "#FF0000"
  - code: "ATTRIBUTE"
    name: "属性错误"
    color: "#00FF00"
  - code: "TOPOLOGY"
    name: "拓扑错误"
    color: "#0000FF"
  - code: "COORDINATE"
    name: "坐标错误"
    color: "#FFFF00"
  - code: "OTHER"
    name: "其他"
    color: "#808080"

supported_formats:
  raster:
    - ".tif"
    - ".tiff"
    - ".bmp"
    - ".png"
    - ".jpg"
  vector:
    - ".shp"
    - ".geojson"
  text:
    - ".txt"
    - ".csv"
